# Use macOS native pinentry (GUI prompt for PIN)
pinentry-program /opt/homebrew/bin/pinentry-mac

# Enable using gpg-agent as the SSH agent (Yubikey auth subkey -> SSH)
enable-ssh-support
ttyname $GPG_TTY

# PIN cache TTLs (seconds) — short by design with Yubikey
default-cache-ttl 60
max-cache-ttl 120
default-cache-ttl-ssh 60
max-cache-ttl-ssh 120
